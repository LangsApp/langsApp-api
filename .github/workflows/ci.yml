name: CI - Build and Test .NET

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore LangApp.sln

    - name: Build
      run: dotnet build LangApp.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test LangApp.sln --no-build --verbosity normal
